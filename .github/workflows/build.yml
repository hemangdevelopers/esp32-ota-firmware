name: ESP32 Firmware Build & OTA Release

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # PlatformIO
      - name: Install PlatformIO
        run: pip install platformio

      # Read version.txt
      - name: Read version
        id: version
        run: |
          if [ -f version.txt ]; then
            VERSION=$(cat version.txt)
          else
            VERSION="0.0.1"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # Generate version.h automatically
      - name: Generate version header
        run: |
          echo '#ifndef FW_VERSION' > src/version.h
          echo "#define FW_VERSION \"${{ steps.version.outputs.VERSION }}\"" >> src/version.h
          echo '#endif' >> src/version.h

          echo "Generated version.h:"
          cat src/version.h

      # Build firmware
      - name: Build ESP32 firmware
        run: pio run

      # Verify build
      - name: Verify build output
        run: |
          test -f .pio/build/esp32dev/firmware.bin || (echo "BUILD FAILED" && exit 1)
          echo "BUILD SUCCESS"

      # Prepare firmware
      - name: Prepare firmware file
        run: |
          mkdir -p output
          cp .pio/build/esp32dev/firmware.bin output/firmware.bin

      # Create/Update Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ESP32 Firmware ${{ steps.version.outputs.VERSION }}
          files: output/firmware.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Status
      - name: Build Status
        run: |
          echo "================================"
          echo "BUILD SUCCESSFUL"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Firmware generated and released"
          echo "================================"
